name: Anonymize pusher
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  anonymize:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Update branch ref via API
        run: |
          SHA="${{ github.sha }}"
          # Delete and recreate the branch via GitHub API
          # This makes github-actions[bot] the branch updater
          curl -s -X DELETE \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/main"
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs" \
            -d "{\"ref\":\"refs/heads/main\",\"sha\":\"${SHA}\"}"
