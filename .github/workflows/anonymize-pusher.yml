name: Anonymize pusher
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  anonymize:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Force push to overwrite pusher
        run: git push --force origin main
