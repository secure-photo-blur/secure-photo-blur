<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#333" stroke-width="2" rx="0"/>

  <!-- Eye icon (left side) -->
  <g transform="translate(200, 280) scale(0.55)">
    <ellipse cx="0" cy="0" rx="200" ry="140" fill="none" stroke="#f0f0f0" stroke-width="18"/>
    <circle cx="0" cy="0" r="65" fill="#b22222"/>
    <circle cx="0" cy="0" r="30" fill="#1a1a1a"/>
    <!-- Blur bars -->
    <rect x="-200" y="-78" width="400" height="24" fill="#1a1a1a" opacity="0.7" rx="4"/>
    <rect x="-200" y="-38" width="400" height="24" fill="#1a1a1a" opacity="0.7" rx="4"/>
    <rect x="-200" y="2" width="400" height="24" fill="#1a1a1a" opacity="0.7" rx="4"/>
    <rect x="-200" y="42" width="400" height="24" fill="#1a1a1a" opacity="0.7" rx="4"/>
    <rect x="-200" y="-78" width="400" height="6" fill="#333" rx="2"/>
    <rect x="-200" y="-38" width="400" height="6" fill="#333" rx="2"/>
    <rect x="-200" y="2" width="400" height="6" fill="#333" rx="2"/>
    <rect x="-200" y="42" width="400" height="6" fill="#333" rx="2"/>
  </g>

  <!-- Accent line separator -->
  <rect x="380" y="220" width="3" height="190" fill="#b22222" rx="2"/>

  <!-- Title -->
  <text x="420" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700" fill="#f0f0f0">
    Secure Photo <tspan font-style="italic" font-weight="400" fill="#cc3333">Blur</tspan>
  </text>

  <!-- Subtitle -->
  <text x="420" y="345" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#aaaaaa">
    Offline, open-source, zero tracking
  </text>

  <!-- Feature pills -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">
    <!-- Pill 1 -->
    <rect x="420" y="380" width="140" height="34" rx="17" fill="none" stroke="#444" stroke-width="1.5"/>
    <text x="490" y="402" text-anchor="middle" fill="#aaaaaa">Works offline</text>
    <!-- Pill 2 -->
    <rect x="575" y="380" width="160" height="34" rx="17" fill="none" stroke="#444" stroke-width="1.5"/>
    <text x="655" y="402" text-anchor="middle" fill="#aaaaaa">Face detection</text>
    <!-- Pill 3 -->
    <rect x="750" y="380" width="180" height="34" rx="17" fill="none" stroke="#444" stroke-width="1.5"/>
    <text x="840" y="402" text-anchor="middle" fill="#aaaaaa">Metadata stripped</text>
  </g>
</svg>
